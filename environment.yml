name: EvoPlantMeth_env
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - cudatoolkit=11.2.0
  - cudnn=8.1
  - bedtools
  - meme
  - pip
  - pip:
      - tensorflow==2.11.0
      - keras==2.11.0
      - h5py>=3.1.0
      - numpy<1.24.0
      - pandas>=1.3.0
      - scikit-learn>=1.0.0
      - scipy>=1.7.0
      - matplotlib>=3.4.0
      - seaborn>=0.11.0
      - logomaker>=0.8